<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Integrador</title>
    <style>
        /* Estilizando o corpo da página */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centraliza horizontalmente */
            justify-content: center; /* Centraliza verticalmente se houver altura */
            text-align: center; /* Centraliza o texto */
            background-color: #f4f4f4; /* Uma cor de fundo leve */
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
            font-size: 3rem; /* Título bem grande */
        }

        p {
            font-size: 1.2rem;
            color: #666;
        }

        /* Estilizando a imagem */
        img {
            max-width: 80%; /* A imagem ocupa 80% da largura da tela */
            height: auto;   /* Mantém a proporção para não amassar */
            border-radius: 15px; /* Bordas arredondadas para estilo */
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2); /* Sombra para dar profundidade */
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Fala tropa!!!!</h1>
    <p>50k é pouco mesmo? Não acompanho muito.</p>
    <img src="imagens/50k.jpg" alt="Descrição da imagem para acessibilidade">
</body>
</html>
